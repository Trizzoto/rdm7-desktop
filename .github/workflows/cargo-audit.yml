name: cargo audit

# Runs `cargo audit` on every push and PR that touches the Rust tree.
# Fails the build if any RustSec advisory matches a dependency in
# src-tauri/Cargo.lock.
#
# `cargo-audit` is installed via the official action with binstall (no
# from-source compile) so the workflow stays under 30 s for cache hits.
#
# Triage when this goes red:
#   1. Read the advisory link printed by cargo-audit.
#   2. If it's exploitable in our context, bump the offending crate.
#   3. If it's a false-positive for our usage, add an
#      [audit.ignore] entry to src-tauri/.cargo/audit.toml with a
#      one-line rationale and a follow-up issue link.

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'release/**'
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/.cargo/audit.toml'
      - '.github/workflows/cargo-audit.yml'

  pull_request:
    branches:
      - master
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/.cargo/audit.toml'
      - '.github/workflows/cargo-audit.yml'

  # Weekly safety net: catches newly disclosed advisories against pinned
  # dependencies, even if the project hasn't been touched.
  schedule:
    - cron: '0 8 * * 1'   # Mondays 08:00 UTC

  workflow_dispatch:

jobs:
  audit:
    name: src-tauri/Cargo.lock
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, no targets)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v1

      - name: Install cargo-audit (binstall, no source compile)
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Show version
        run: cargo audit --version

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit --deny warnings

      - name: Summarise on failure
        if: failure()
        run: |
          echo "::error::cargo audit found vulnerabilities."
          echo "::error::To reproduce locally:"
          echo "::error::  cd src-tauri && cargo audit"
          echo "::error::See https://rustsec.org for advisory details."
          echo "::error::To ignore a false-positive: add an entry to"
          echo "::error::src-tauri/.cargo/audit.toml with a rationale."
